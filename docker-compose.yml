version: '3.8'

services:
  app:
    build:
      context: ./backend
    container_name: ats_backend
    volumes:
      - ./backend:/var/www
    ports:
      - "8000:8000"
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: ats_db
    restart: always
    environment:
      POSTGRES_USER: ats_user
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: ats_db
    ports:
      - "5432:5432"

  pgadmin:
    image: dpage/pgadmin4
    container_name: ats_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"

  prometheus:
    image: prom/prometheus
    container_name: ats_prometheus
    volumes:
    - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
    - "9090:9090"

  grafana:
    image: grafana/grafana
    container_name: ats_grafana
    ports:
        - "3001:3000"

  redis:
    image: redis:7
    container_name: ats_redis
    ports:
    - "6379:6379"