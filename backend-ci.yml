name: Backend CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  backend-tests:
    name: Laravel Backend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: ats_test
          POSTGRES_USER: ats_user
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ats_user -d ats_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo, pdo_pgsql, redis, bcmath, zip
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Configure database for CI
        run: |
          php -r "file_put_contents('.env', str_replace('DB_CONNECTION=sqlite', 'DB_CONNECTION=pgsql', file_get_contents('.env')));"
          php -r "file_put_contents('.env', str_replace('# DB_HOST=127.0.0.1', 'DB_HOST=127.0.0.1', file_get_contents('.env')));"
          php -r "file_put_contents('.env', str_replace('# DB_PORT=3306', 'DB_PORT=5432', file_get_contents('.env')));"
          php -r "file_put_contents('.env', str_replace('# DB_DATABASE=laravel', 'DB_DATABASE=ats_test', file_get_contents('.env')));"
          php -r "file_put_contents('.env', str_replace('# DB_USERNAME=root', 'DB_USERNAME=ats_user', file_get_contents('.env')));"
          php -r "file_put_contents('.env', str_replace('# DB_PASSWORD=', 'DB_PASSWORD=secret', file_get_contents('.env')));"

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests
        run: php artisan test
